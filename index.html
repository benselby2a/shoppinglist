<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f3efe6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MSL" />
    <title>🐳🛒 MSL</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon.svg" />
    <link rel="stylesheet" href="./app/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>🐳🛒 MSL <span id="app-version" class="app-version"></span></h1>
        </div>
      </header>

      <section id="sync-bar" class="sync-bar sync-offline">
        <span id="sync-text">Offline</span>
        <span id="sync-meta">0 pending · 0 conflicts</span>
      </section>

      <main>
        <div id="sections-container"></div>
      </main>

      <section class="card add-card">
        <form id="add-form" autocomplete="off">
          <div class="add-layout">
            <input
              id="item-entry"
              class="add-item-input"
              name="inventory-entry"
              placeholder="Type Item Here"
              required
              autocomplete="off"
              autocapitalize="none"
              autocorrect="off"
              spellcheck="false"
              inputmode="text"
              enterkeyhint="done"
            />
            <div id="item-options" class="item-options" hidden></div>
            <select id="item-section"></select>
            <input id="item-qty" name="shopping-qty" placeholder="Qty" autocomplete="off" />
            <div class="add-flags-row">
              <label class="add-flag-check">
                <input id="add-big-shop-checkbox" type="checkbox" />
                <span>🛒 Big Shop</span>
              </label>
            </div>
            <button id="add-item-btn" class="add-submit-btn" type="submit" tabindex="0">Add Item</button>
          </div>
        </form>
      </section>
      <button id="add-fab-btn" class="add-fab-btn" type="button" aria-label="Add new item" hidden>＋</button>
      <div class="options-fab-wrap">
        <button id="options-fab-btn" class="options-fab-btn" type="button" aria-label="Show options">☰</button>
        <div id="options-menu" class="options-menu" hidden>
          <button id="top-undo-btn" class="icon-btn" type="button" aria-label="Undo last action" disabled>Undo</button>
          <button id="small-shop-filter-btn" class="icon-btn" type="button">Hide Big Shop Items</button>
          <button id="add-favourites-btn" class="icon-btn" type="button">Add Favourite Items</button>
          <button id="show-checked-btn" class="icon-btn" type="button">Show Item Database</button>
        </div>
      </div>

      <footer class="footer-actions">
      </footer>
    </div>

    <div id="checked-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Item Database</h2>
          <button id="close-checked-btn" class="icon-btn" type="button">✕</button>
        </div>
        <div class="db-filter-wrap">
          <input id="checked-filter-input" type="text" placeholder="Filter by item name" autocomplete="off" />
        </div>
        <div id="db-feedback" class="db-feedback" hidden>Updated</div>
        <ul id="checked-list"></ul>
      </div>
    </div>

    <div id="check-toast" class="check-toast" hidden>
      <span id="check-toast-text">Checked Item</span>
    </div>

    <div id="release-banner" class="release-banner" hidden>
      <span>New version available</span>
      <button id="release-refresh-btn" type="button">Refresh</button>
    </div>

    <div id="conflict-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Conflict Detected</h2>
          <button id="close-conflict-btn" class="icon-btn" type="button">✕</button>
        </div>
        <p id="conflict-message"></p>
        <div class="db-actions">
          <button id="resolve-conflict-btn" class="icon-btn" type="button">OK</button>
        </div>
      </div>
    </div>

    <script type="module" src="./app/app.js"></script>
  </body>
</html>
