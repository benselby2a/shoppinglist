<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f3efe6" />
    <title>Shopping List</title>
    <link rel="manifest" href="./app/manifest.webmanifest" />
    <link rel="stylesheet" href="./app/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Shopping List</h1>
          <p id="household-label">Household: Shared</p>
        </div>
        <div class="topbar-actions">
          <button id="top-undo-btn" class="icon-btn" type="button" aria-label="Undo last action" disabled>Undo</button>
          <button id="add-favourites-btn" class="icon-btn" type="button">Add Favourite Items</button>
          <button id="show-checked-btn" class="icon-btn" type="button">Show Item Database</button>
        </div>
      </header>

      <section id="sync-bar" class="sync-bar sync-offline">
        <span id="sync-text">Offline</span>
        <span id="sync-meta">0 pending · 0 conflicts</span>
      </section>

      <main>
        <div id="sections-container"></div>
      </main>

      <section class="card add-card">
        <div class="add-card-header">
          <h2>Add New Item</h2>
          <button id="toggle-add-card-btn" class="icon-btn add-toggle-btn" type="button" aria-expanded="true" aria-label="Collapse new item panel">Collapse ▾</button>
        </div>
        <form id="add-form" autocomplete="off">
          <input
            id="item-entry"
            name="inventory-entry"
            list="item-options"
            placeholder="Add milk, bananas..."
            required
            autocomplete="new-password"
            autocapitalize="off"
            autocorrect="on"
            spellcheck="true"
            inputmode="text"
          />
          <datalist id="item-options"></datalist>
          <div class="row">
            <select id="item-section"></select>
            <input id="item-qty" name="shopping-qty" placeholder="Qty" autocomplete="off" />
            <button id="add-item-btn" type="submit" tabindex="0">Add Item</button>
          </div>
        </form>
      </section>

      <footer class="footer-actions">
      </footer>
    </div>

    <div id="checked-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Item Database</h2>
          <button id="close-checked-btn" class="icon-btn" type="button">✕</button>
        </div>
        <div id="db-feedback" class="db-feedback" hidden>Updated</div>
        <ul id="checked-list"></ul>
      </div>
    </div>

    <div id="check-toast" class="check-toast" hidden>
      <span id="check-toast-text">Checked Item</span>
      <button id="check-toast-undo-btn" type="button">Undo</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="./app/app.js"></script>
  </body>
</html>
